<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>El Púlsar de mi Energía</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Quicksand',sans-serif;}
    canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%;}

    #modal{
      position:fixed;inset:0;z-index:9999;
      display:flex;justify-content:center;align-items:center;
      background:#020005;
      transition:opacity 1.5s ease;
    }
    #modal.oculto{opacity:0;pointer-events:none;}

    .card{
      background:#0a0510;
      border: 1px solid rgba(0, 255, 255, 0.15);
      border-radius:28px;
      padding:26px 26px 30px;
      width:min(340px, 88vw);
      display:flex;flex-direction:column;align-items:center;gap:0;
      box-shadow:0 6px 40px rgba(0, 255, 255, 0.15);
    }

    .card-img-wrap{
      width:100%;border-radius:14px;overflow:hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom:22px;
      aspect-ratio:4/3;
      background:#000;
      position:relative;
    }
    .card-img-wrap img{
      width:100%;height:100%;object-fit:cover;display:block;border-radius:14px;
    }

    .card-quote{
      font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;
      font-size:clamp(1.15rem,4.5vw,1.35rem);
      color:#e0d8ff;text-align:center;line-height:1.45;
      margin-bottom:10px;
    }
    .card-sub{
      font-size:0.62rem;font-weight:600;letter-spacing:5px;text-transform:uppercase;
      color:rgba(0, 255, 255, 0.7);margin-bottom:26px;
      text-align: center;
    }

    #btn-entrar{
      width:100%;
      font-family:'Quicksand',sans-serif;font-size:0.74rem;font-weight:600;
      letter-spacing:4px;text-transform:uppercase;
      padding:1rem 0;
      background:transparent;
      color:#00ffff;
      border:1px solid #00ffff;
      border-radius:50px;
      cursor:pointer;
      transition:all 0.4s ease;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.1) inset;
    }
    #btn-entrar:hover{
      background:rgba(0, 255, 255, 0.15);
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.4) inset;
    }

    .top-text{
      position:fixed;top:5%;left:50%;transform:translateX(-50%);
      font-family:'Cormorant Garamond',serif;font-style:italic;
      font-size:clamp(1.1rem,3.5vw,1.9rem);
      color:rgba(255,255,255,0.9);z-index:10;pointer-events:none;white-space:nowrap;
      text-shadow:0 0 20px rgba(0, 255, 255, 0.8);display:none;
    }
    #hint{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);font-size:0.62rem;letter-spacing:3px;text-transform:uppercase;color:rgba(180,100,255,0.5);pointer-events:none;z-index:10;display:none;}
  </style>
</head>
<body>

<div id="modal">
  <div class="card">
    <div class="card-img-wrap">
      <img src="foto.jpg" alt="Nosotros">
    </div>
    <div class="card-quote">Volveré por ti. Jamás dejaré de amarte, sin importar la distancia. ☄️</div>
    <div class="card-sub">Nuestra luz no se apagará</div>
    <button id="btn-entrar">
      Iniciar Secuencia
    </button>
  </div>
</div>

<div class="top-text" id="top-text"> Brillando a años luz por ti </div>
<div id="hint">Desliza para rotar la vista</div>
<canvas id="galaxy"></canvas>

<audio id="musica" loop>
  <source src="cancion.mp3" type="audio/mpeg">
</audio>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById('galaxy'),
  antialias: !isMobile, alpha: true, powerPreference: 'high-performance'
});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020005, 0.0008);
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 1, 10000);
camera.position.set(0, isMobile ? 350 : 250, isMobile ? 800 : 500);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.05;
controls.maxDistance = 1500; controls.minDistance = 50; controls.enablePan = false;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight));
bloom.threshold = 0.15; bloom.strength = 1.8; bloom.radius = 0.8;
composer.addPass(bloom);

const col = new THREE.Color();
let diskMesh;
(function(){
  const n = isMobile ? 40000 : 80000;
  const pos = new Float32Array(n*3);
  const color = new Float32Array(n*3);
  const size = new Float32Array(n);
  for(let i=0; i<n; i++){
    const i3 = i*3;
    const t = Math.pow(Math.random(), 1.2); 
    const rad = 25 + t * 450; 
    const ang = Math.random() * Math.PI * 2;
    const ySpread = (Math.random() - 0.5) * 6 * Math.exp(-rad/100);
    pos[i3] = Math.cos(ang) * rad; pos[i3+1] = ySpread; pos[i3+2] = Math.sin(ang) * rad;
    if(rad < 50) col.setHSL(0.5, 0.9, 0.8 + Math.random()*0.2);
    else if (rad < 150) col.setHSL(0.52 + Math.random()*0.05, 0.9, 0.5 + Math.random()*0.2);
    else if (rad < 300) col.setHSL(0.65 + Math.random()*0.1, 0.8, 0.4 + Math.random()*0.2);
    else col.setHSL(0.75 + Math.random()*0.1, 0.9, 0.3 + Math.random()*0.2);
    color[i3]=col.r; color[i3+1]=col.g; color[i3+2]=col.b;
    size[i] = Math.random() * (isMobile ? 1.5 : 2.0);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('color', new THREE.BufferAttribute(color, 3));
  g.setAttribute('size', new THREE.BufferAttribute(size, 1));
  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `attribute float size; varying vec3 vColor; void main() { vColor = color; vec4 mvPosition = modelViewMatrix * vec4(position, 1.0); gl_PointSize = size * (300.0 / -mvPosition.z); gl_Position = projectionMatrix * mvPosition; }`,
    fragmentShader: `varying vec3 vColor; void main() { float d = distance(gl_PointCoord, vec2(0.5)); if(d > 0.5) discard; gl_FragColor = vec4(vColor, smoothstep(0.5, 0.0, d) * 0.9); }`,
    blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, vertexColors: true
  });
  diskMesh = new THREE.Points(g, mat);
  scene.add(diskMesh);
})();

const magneticGroup = new THREE.Group(); scene.add(magneticGroup);
(function(){
  const material = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.25, blending: THREE.AdditiveBlending });
  for(let i=0; i<12; i++){
    const curve = new THREE.EllipseCurve(0, 0, 60, 90, 0, 2 * Math.PI, false, 0);
    const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(curve.getPoints(64).map(p => new THREE.Vector3(p.x, p.y, 0))), material);
    line.rotation.y = (i / 12) * Math.PI; magneticGroup.add(line);
  }
})();

scene.add(new THREE.Mesh(new THREE.SphereGeometry(8, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffffff })));

function createJet(direction) {
  const geom = new THREE.CylinderGeometry(0.1, 15, 600, 32, 1, true); geom.translate(0, 300, 0);
  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `uniform float uTime; varying vec2 vUv; void main() { float alpha = smoothstep(1.0, 0.0, vUv.y) * smoothstep(1.0, 0.0, abs(vUv.x - 0.5)*2.0); vec3 color = mix(vec3(0.0, 1.0, 1.0), vec3(0.5, 0.0, 1.0), vUv.y); gl_FragColor = vec4(color * (0.8 + 0.2 * sin(uTime * 12.0 - vUv.y * 20.0)), alpha * 0.8); }`,
    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide
  });
  const jet = new THREE.Mesh(geom, mat); if (direction < 0) jet.rotation.x = Math.PI; return jet;
}
const jetTop = createJet(1); const jetBottom = createJet(-1); scene.add(jetTop, jetBottom);

function mkSpecialSpr(txt) {
  const cv = document.createElement('canvas'); cv.width = 1200; cv.height = 200;
  const cx = cv.getContext('2d'); cx.font = "bold 90px 'Quicksand', sans-serif";
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.shadowColor = '#ffd700'; cx.shadowBlur = 25;
  cx.fillStyle = '#ffdf00'; cx.fillText(txt, 600, 100);
  return new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(cv), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
}
const specialText = mkSpecialSpr("Ale y Mike 4ever");
specialText.position.set(0, 80, 0); specialText.scale.set(isMobile ? 320 : 280, isMobile ? 53 : 46, 1);
scene.add(specialText);

const phrases = ["Mi energía siempre te alcanzará", "Una despedida no apaga este núcleo", "Brillando a años luz por ti", "Gravitando siempre hacia ti", "Un brillo que el tiempo no consume", "Nuestra luz no conoce la distancia", "Ecos de mi amor en el vacío", "Hasta que nuestras órbitas se crucen de nuevo"];
const textGroup = new THREE.Group(); scene.add(textGroup);
for(let i=0; i<phrases.length; i++){
  const cv = document.createElement('canvas'); cv.width = 1200; cv.height = 150;
  const cx = cv.getContext('2d'); cx.font = "italic 60px 'Cormorant Garamond', serif"; cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.shadowColor = 'rgba(0, 255, 255, 0.8)'; cx.shadowBlur = 15; cx.fillStyle = '#ffffff'; cx.fillText(phrases[i], 600, 75);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(cv), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.8 }));
  const ang = (i / phrases.length) * Math.PI * 2;
  sp.position.set(Math.cos(ang)*280, (Math.random()-0.5)*30, Math.sin(ang)*280);
  sp.scale.set(isMobile ? 300 : 250, isMobile ? 37 : 31, 1); textGroup.add(sp);
}

(function(){
  const g = new THREE.BufferGeometry(); const pos = new Float32Array(1500 * 3);
  for(let i=0; i<1500; i++){
    const rad = 600 + Math.random() * 2000; const ang1 = Math.acos(Math.random() * 2 - 1); const ang2 = Math.random() * Math.PI * 2;
    pos[i*3] = rad * Math.sin(ang1) * Math.cos(ang2); pos[i*3+1] = rad * Math.sin(ang1) * Math.sin(ang2); pos[i*3+2] = rad * Math.cos(ang1);
  }
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color: 0x88aaff, size: 1.0, transparent: true, opacity: 0.4 })));
})();

document.getElementById('btn-entrar').addEventListener('click', () => {
  const m = document.getElementById('modal'); m.classList.add('oculto');
  setTimeout(() => m.style.display = 'none', 1500);
  document.getElementById('top-text').style.display = 'block';
  if (isMobile) document.getElementById('hint').style.display = 'block';
  const a = document.getElementById('musica'); a.currentTime = 0; a.play().catch(()=>{});
});

window.addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight); });

const clock = new THREE.Clock();
function loop() {
  requestAnimationFrame(loop);
  const t = clock.getElapsedTime();
  diskMesh.rotation.y = t * 0.4; magneticGroup.rotation.y = t * 0.8;
  textGroup.rotation.y = t * 0.05;
  textGroup.children.forEach(sp => { sp.lookAt(camera.position); sp.material.opacity = 0.6 + Math.sin(t * 1.5 + sp.position.x) * 0.4; });
  specialText.lookAt(camera.position); specialText.position.y = 80 + Math.sin(t * 2.0) * 8;
  jetTop.material.uniforms.uTime.value = t; jetBottom.material.uniforms.uTime.value = t;
  controls.update(); composer.render();
}
loop();
</script>
</body>
</html>
