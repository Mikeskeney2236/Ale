<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>El Púlsar de mi Energía</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Quicksand',sans-serif;}
    canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%;}

    #modal{
      position:fixed;inset:0;z-index:9999;
      display:flex;justify-content:center;align-items:center;
      background:#020005;
      transition:opacity 1.5s ease;
    }
    #modal.oculto{opacity:0;pointer-events:none;}

    .card{
      background:#0a0510;
      border: 1px solid rgba(0, 255, 255, 0.15);
      border-radius:28px;
      padding:26px 26px 30px;
      width:min(340px, 88vw);
      display:flex;flex-direction:column;align-items:center;gap:0;
      box-shadow:0 6px 40px rgba(0, 255, 255, 0.15);
    }

    .card-img-wrap{
      width:100%;border-radius:14px;overflow:hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom:22px;
      aspect-ratio:1/1; /* Cambiado a cuadrado para que no se corte */
      background:#111;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card-img-wrap img{
      width:100%;height:100%;object-fit:cover; /* Esto asegura que la foto llene el espacio */
      display:block;
    }

    .card-quote{
      font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;
      font-size:clamp(1.15rem,4.5vw,1.35rem);
      color:#e0d8ff;text-align:center;line-height:1.45;
      margin-bottom:10px;
    }
    .card-sub{
      font-size:0.62rem;font-weight:600;letter-spacing:5px;text-transform:uppercase;
      color:rgba(0, 255, 255, 0.7);margin-bottom:26px;
      text-align: center;
    }

    #btn-entrar{
      width:100%;
      font-family:'Quicksand',sans-serif;font-size:0.74rem;font-weight:600;
      letter-spacing:4px;text-transform:uppercase;
      padding:1rem 0;
      background:transparent;
      color:#00ffff;
      border:1px solid #00ffff;
      border-radius:50px;
      cursor:pointer;
      transition:all 0.4s ease;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.1) inset;
    }
    #btn-entrar:hover{
      background:rgba(0, 255, 255, 0.15);
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.4) inset;
    }

    .top-text{
      position:fixed;top:5%;left:50%;transform:translateX(-50%);
      font-family:'Cormorant Garamond',serif;font-style:italic;
      font-size:clamp(1.1rem,3.5vw,1.9rem);
      color:rgba(255,255,255,0.9);z-index:10;pointer-events:none;white-space:nowrap;
      text-shadow:0 0 20px rgba(0, 255, 255, 0.8);display:none;
    }
  </style>
</head>
<body>

<div id="modal">
  <div class="card">
    <div class="card-img-wrap">
      <!-- Asegúrate de que el archivo en GitHub se llame exactamente foto.jpg -->
      <img src="foto.jpg" alt="Nosotros">
    </div>
    <div class="card-quote">Volveré por ti. Jamás dejaré de amarte, sin importar la distancia. ☄️</div>
    <div class="card-sub">Nuestra luz no se apagará</div>
    <button id="btn-entrar">Iniciar Secuencia</button>
  </div>
</div>

<div class="top-text" id="top-text"> Brillando a años luz por ti </div>
<canvas id="galaxy"></canvas>

<!-- Asegúrate de que el archivo en GitHub se llame exactamente cancion.mp3 -->
<audio id="musica" loop>
  <source src="cancion.mp3" type="audio/mpeg">
</audio>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ... (El resto del código de la animación se mantiene igual para no romper nada)
// Solo he cambiado el color del texto especial abajo:

function mkSpecialSpr(txt) {
  const cv = document.createElement('canvas');
  cv.width = 1200; cv.height = 200;
  const cx = cv.getContext('2d');
  cx.font = "bold 90px 'Quicksand', sans-serif";
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  
  // COLOR DORADO PARA QUE RESALTE
  cx.shadowColor = '#ffd700'; 
  cx.shadowBlur = 20;
  cx.fillStyle = '#ffdf00'; 
  cx.fillText(txt, 600, 100);
  
  return new THREE.Sprite(new THREE.SpriteMaterial({
    map: new THREE.CanvasTexture(cv),
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  }));
}

// ... (resto del script original)
</script>
</body>
</html>
